<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Tayang Iklan & Advertorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Memastikan modal tampil halus */
        #imageModal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans p-4 md:p-8 min-h-screen">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Daftar Tayang Iklan</h1>
            <p class="text-gray-500 mt-2">Pratinjau, cari, dan unduh halaman hasil render.</p>
        </div>
        
        <div class="relative w-full md:w-96">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="searchInput" class="bg-white border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3 shadow-sm" placeholder="Cari judul, tanggal, atau halaman...">
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="gallery-container">
        </main>

    <div id="emptyState" class="hidden max-w-7xl mx-auto text-center py-12">
        <p class="text-gray-500 text-lg">Pencarian tidak ditemukan.</p>
    </div>

    <div id="imageModal" class="fixed inset-0 z-50 hidden opacity-0 flex items-center justify-center bg-gray-900/80 backdrop-blur-sm p-4 md:p-8">
        <div class="relative w-full max-w-4xl max-h-full flex flex-col items-center">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white hover:text-gray-300 bg-gray-800/50 rounded-full p-2 backdrop-blur-md transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <img id="modalImage" src="" alt="Preview" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl">
            
            <div class="mt-4 w-full flex justify-between items-center bg-gray-900/60 backdrop-blur-md text-white p-4 rounded-lg">
                <p id="modalTitle" class="text-sm font-medium line-clamp-2 pr-4"></p>
                <a id="modalDownloadBtn" href="" download class="flex-shrink-0 flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Unduh
                </a>
            </div>
        </div>
    </div>

    <script>
        const adsData = [
            { filename: "20 Feb - HAL 10.jpg", date: "20/02/2026", title: "Jembatan Pelemgede Ambrol, Dewan Desak Penjelasan dari Kontraktor" },
            { filename: "23 Feb - HAL 10.jpg", date: "23/02/2026", title: "Dewan Ingatkan Batasan Tongtek selama Bulan Ramadhan" },
            { filename: "25 Febr - HAL 10.jpg", date: "25/02/2026", title: "Dewan Dorong Sosialisasi Pembebasan Denda Administratif Disdukcapil Dimasifkan" },
            { filename: "06 Maret - HAL 5.jpg", date: "06/03/2026", title: "Gelar Tarhima, DPRD Pati Santuni Anak Yatim" },
            { filename: "09 Maret - HAL 10.jpg", date: "09/03/2026", title: "Dewan Soroti Dua Kawasan PKL yang Sepi" },
            { filename: "10 Maret - HAL 10.jpg", date: "10/03/2026", title: "Berkat Sidak DPRD, Ijazah Tertahan Bisa Diambil Kembali" },
            { filename: "16 April - HAL 6.jpg", date: "16/04/2026", title: "DPRD Siap Berbenah Cegah Penyalahgunaan Anggaran Pokir" },
            { filename: "17 April - HAL 6.jpg", date: "17/04/2026", title: "Dewan Desak Dispertan Proaktif Atasi Masalah Pupuk Subsidi" },
            { filename: "21 April - HAL 8.jpg", date: "21/04/2026", title: "Sosialisasi Permendikbud, DPRD Tegaskan Sekolah Negeri Dilarang Tarik Pungutan" },
            { filename: "08 Mei - HAL 3.jpg", date: "08/05/2026", title: "Ketua DPRD Apresiasi Polisi Berhasil Ringkus Pelaku Tindak Asusila" },
            { filename: "12 Mei - HAL 6.jpg", date: "12/05/2026", title: "DPRD Godok Perubahan Perda Pajak dan Retribusi Daerah" },
            { filename: "18 Mei - HAL 7.jpg", date: "18/05/2026", title: "DPRD Usul Rombak Total Kepengurusan Yayasan" }
        ];

        const container = document.getElementById('gallery-container');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        
        // Modal Elements
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalDownloadBtn = document.getElementById('modalDownloadBtn');

        // Fungsi Render Data
        function renderCards(data) {
            container.innerHTML = ''; // Bersihkan container
            
            if(data.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            data.forEach((item) => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden card-hover hover:shadow-lg flex flex-col cursor-pointer group";
                
                // Event Listener untuk membuka Modal saat Card diklik
                card.onclick = () => openModal(item.filename, item.title);

                card.innerHTML = `
                    <div class="relative w-full h-64 bg-gray-100 border-b border-gray-100 overflow-hidden">
                        <img src="${item.filename}" alt="${item.title}" class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x600?text=Gambar+Belum+Ada'">
                        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded text-xs font-semibold text-gray-700 shadow-sm">
                            ${item.date}
                        </div>
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center">
                            <span class="opacity-0 group-hover:opacity-100 bg-white/90 text-gray-900 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm transition-opacity transform translate-y-2 group-hover:translate-y-0 duration-300">Lihat Detail</span>
                        </div>
                    </div>
                    <div class="p-4 flex flex-col flex-grow justify-between gap-3">
                        <h2 class="text-sm font-semibold text-gray-900 leading-snug line-clamp-3">
                            ${item.title}
                        </h2>
                        <div class="flex items-center justify-between mt-auto">
                            <div class="inline-flex items-center gap-1.5 text-xs text-blue-600 font-medium bg-blue-50 px-2 py-1 rounded truncate max-w-[70%]">
                                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                <span class="truncate">${item.filename.split('.')[0]}</span>
                            </div>
                            <a href="${item.filename}" download class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 p-1.5 rounded transition-colors" onclick="event.stopPropagation();" title="Unduh Langsung">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Fitur Real-time Search
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = adsData.filter(item => 
                item.title.toLowerCase().includes(searchTerm) || 
                item.filename.toLowerCase().includes(searchTerm) ||
                item.date.toLowerCase().includes(searchTerm)
            );
            renderCards(filteredData);
        });

        // Fungsi Control Modal Lightbox
        function openModal(imageSrc, title) {
            modalImage.src = imageSrc;
            modalTitle.textContent = title;
            modalDownloadBtn.href = imageSrc; // Set link download
            
            modal.classList.remove('hidden');
            // Sedikit delay untuk memicu animasi opacity Tailwind
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
            }, 10);
            document.body.style.overflow = 'hidden'; // Kunci scroll background
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // Sesuaikan dengan durasi transisi
            document.body.style.overflow = 'auto'; // Kembalikan scroll
        }

        // Tutup modal jika area luar (backdrop) diklik
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Render pertama kali saat halaman dimuat
        renderCards(adsData);
    </script>
</body>
</html>
